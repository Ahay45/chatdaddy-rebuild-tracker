<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 Agentic Pipeline — ChatDaddy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0f1a; color: #e2e8f0; min-height: 100vh; }

header { background: #0d1424; border-bottom: 1px solid #1e2d40; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
header h1 { font-size: 17px; font-weight: 700; color: #00d4ff; }
.header-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.repo-link { font-size: 11px; color: #475569; text-decoration: none; padding: 4px 10px; border: 1px solid #1e2d40; border-radius: 6px; }
.repo-link:hover { color: #94a3b8; border-color: #2d4060; }
.updated { font-size: 11px; color: #3d5068; }
.btn-refresh { font-size: 11px; color: #94a3b8; padding: 4px 10px; background: #1e2d40; border: none; border-radius: 6px; cursor: pointer; }
.btn-refresh:hover { background: #263d55; }

.tabs { display: flex; gap: 2px; padding: 16px 28px 0; border-bottom: 1px solid #1e2d40; background: #0d1424; overflow-x: auto; }
.tab { padding: 8px 18px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: #94a3b8; }
.tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }

.container { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

.stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat { background: #0d1424; border: 1px solid #1e2d40; border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 90px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 800; }
.stat-label { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat.blue .stat-num { color: #00d4ff; }
.stat.green .stat-num { color: #10b981; }
.stat.yellow .stat-num { color: #f59e0b; }
.stat.purple .stat-num { color: #7c3aed; }
.stat.red .stat-num { color: #ef4444; }

.kanban-board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 16px; align-items: flex-start; }
.kanban-col { background: #0b1320; border: 1px solid #1e2d40; border-radius: 12px; min-width: 260px; flex: 0 0 260px; }
.kanban-col-header { padding: 12px 16px 8px; border-bottom: 1px solid #1e2d40; }
.kanban-col-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.kanban-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
.kanban-col-count { font-size: 11px; background: #1e2d40; color: #64748b; border-radius: 20px; padding: 1px 8px; }
.col-missing  .kanban-col-title { color: #475569; }
.col-pr       .kanban-col-title { color: #7c3aed; }
.col-done     .kanban-col-title { color: #10b981; }

.col-action-btn { width: 100%; font-size: 11px; padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: all 0.15s; text-align: center; display: block; }
.col-action-btn.discover { background: rgba(0,212,255,0.07); color: #64748b; border: 1px solid rgba(0,212,255,0.15); }
.col-action-btn.discover:hover { background: rgba(0,212,255,0.12); color: #00d4ff; border-color: rgba(0,212,255,0.35); }
.col-action-btn.fix { background: rgba(124,58,237,0.08); color: #7c6aaf; border: 1px solid rgba(124,58,237,0.2); }
.col-action-btn.fix:hover { background: rgba(124,58,237,0.15); color: #a78bfa; border-color: rgba(124,58,237,0.35); }

.kanban-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 80px; }

.kanban-card { background: #0d1828; border: 1px solid #1e2d40; border-radius: 10px; padding: 12px 14px; }
.kanban-card.col-pr      { border-left: 3px solid #7c3aed; }
.kanban-card.col-done    { border-left: 3px solid #10b981; }
.kanban-card.col-missing { border-left: 3px solid #334155; }

.kc-number { font-size: 10px; color: #475569; font-family: monospace; margin-bottom: 3px; }
.kc-title  { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
.kc-desc   { font-size: 10px; color: #64748b; line-height: 1.5; margin-bottom: 7px; }
.kc-position { font-size: 10px; color: #94a3b8; background: rgba(148,163,184,0.07); border: 1px solid rgba(148,163,184,0.12); border-radius: 5px; padding: 4px 8px; margin-bottom: 8px; line-height: 1.6; }
.kc-position b { color: #00d4ff; }

.kc-branch { font-size: 10px; color: #7c3aed; font-family: monospace; text-decoration: none;
  background: rgba(124,58,237,0.08); padding: 2px 7px; border-radius: 4px;
  border: 1px solid rgba(124,58,237,0.2); display: inline-block; max-width: 220px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 7px; }
.kc-branch:hover { background: rgba(124,58,237,0.18); color: #a78bfa; }

.kc-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.kc-pr-btn { font-size: 10px; color: #7c3aed; text-decoration: none; padding: 2px 8px; border: 1px solid rgba(124,58,237,0.3); border-radius: 5px; }
.kc-pr-btn:hover { background: rgba(124,58,237,0.1); }

.ci { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; display: inline-flex; align-items: center; gap: 3px; }
.ci.pass    { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.25); }
.ci.fail    { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
.ci.pending { background: rgba(100,116,139,0.1); color: #64748b; border: 1px solid rgba(100,116,139,0.2); }
.ci.running { background: rgba(0,212,255,0.1);   color: #00d4ff; border: 1px solid rgba(0,212,255,0.2); animation: pulse 1.5s infinite; }

.kc-empty { font-size: 11px; color: #2d4060; text-align: center; padding: 20px 8px; }

.gap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.gap-item { background: #0d1424; border: 1px solid #1e2d40; border-radius: 10px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
.gap-item.ok      { border-color: rgba(16,185,129,0.3); }
.gap-item.missing { border-color: rgba(239,68,68,0.2); }
.gap-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.gap-label { font-size: 12px; font-weight: 600; }
.gap-sub   { font-size: 10px; margin-top: 2px; }
.gap-item.ok .gap-sub      { color: #10b981; }
.gap-item.missing .gap-sub { color: #ef4444; }
.gap-pos { font-size: 9px; color: #334155; margin-top: 4px; line-height: 1.4; }

.loading { color: #334155; font-size: 13px; padding: 40px; text-align: center; }
.error-msg { color: #ef4444; font-size: 12px; padding: 20px; text-align: center; background: rgba(239,68,68,0.06); border-radius: 10px; border: 1px solid rgba(239,68,68,0.15); }

/* Toast */
#toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast { background: #0d1828; border: 1px solid #1e2d40; border-radius: 10px; padding: 10px 16px; font-size: 12px; color: #94a3b8; box-shadow: 0 4px 16px rgba(0,0,0,0.4); animation: slideIn 0.2s ease; max-width: 340px; }
.toast.success { border-color: rgba(16,185,129,0.4); color: #10b981; }
.toast.error   { border-color: rgba(239,68,68,0.4); color: #ef4444; }
.toast.info    { border-color: rgba(0,212,255,0.3); color: #00d4ff; }

@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1e2d40; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>&#9889; V2 Agentic Pipeline &#8212; ChatDaddy</h1>
  <div class="header-meta">
    <a class="repo-link" href="https://github.com/chatdaddy/frontend-dashboard-v2/pulls" target="_blank">&#8599; GitHub PRs</a>
    <a class="repo-link" href="https://github.com/Ahay45/chatdaddy-rebuild-tracker/actions" target="_blank">&#8599; CI Actions</a>
    <button class="btn-refresh" onclick="load()">&#8635; Refresh</button>
    <span class="updated" id="last-updated">Loading&#8230;</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('kanban')">Kanban</div>
  <div class="tab" onclick="showTab('prs')">All PRs</div>
  <div class="tab" onclick="showTab('gap')">Gap Tracker</div>
</div>

<div class="container">
  <div class="stats-bar" id="stats-bar"><div class="loading">Fetching from GitHub&#8230;</div></div>

  <div id="tab-kanban" class="section active">
    <div class="kanban-board" id="kanban-board"><div class="loading">Loading PRs&#8230;</div></div>
  </div>

  <div id="tab-prs" class="section">
    <div id="prs-list"></div>
  </div>

  <div id="tab-gap" class="section">
    <div class="gap-grid" id="gap-grid"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
var BRANCH_BASE = 'https://github.com/chatdaddy/frontend-dashboard-v2/tree/';
var PR_BASE     = 'https://github.com/chatdaddy/frontend-dashboard-v2/pull/';
var ACTIONS_URL = 'https://github.com/Ahay45/chatdaddy-rebuild-tracker/actions/workflows/deploy.yml';
var FIX_PRS_WORKFLOW = 'https://github.com/chatdaddy/frontend-dashboard-v2/actions';

var GAP = {
  'contact-vcard': true,
  'variable-chips': true,
  'pinned-filters': true,
  'admin-panel': true,
  'no-channels-state': false,
  'manage-channels': false,
  'crm-ticket-details': false,
  'crm-property-settings': false,
  'crm-custom-fields': false,
  'dashboard-charts': true,
  'broadcasts-analytics': false,
  'broadcasts-audience': false,
  'admin-team-analytics': false,
  'ai-chat-testing': false,
  'module-team': false,
};

var FEATURE_META = {
  'contact-vcard':        { label: 'Contact vCard',           module: 'inbox' },
  'variable-chips':       { label: 'Variable chips',          module: 'inbox' },
  'pinned-filters':       { label: 'Pinned Filters Bar',      module: 'inbox' },
  'admin-panel':          { label: 'Admin Panel',             module: 'admin' },
  'dashboard-charts':     { label: 'Dashboard Charts',        module: 'dashboard' },
  'no-channels-state': {
    label: 'No Channels Empty State', module: 'inbox',
    desc: 'Empty state when user has no WhatsApp channels connected',
    position: 'Inbox sidebar - channel list area (top)',
    flow: 'Login - no channels - illustration + Connect Channel CTA',
  },
  'manage-channels': {
    label: 'Manage Channels Dialog', module: 'inbox',
    desc: 'View, rename and delete connected channels',
    position: 'Inbox header - kebab menu - Manage Channels',
    flow: 'Header menu - ManageChannelsDialog - list accounts - rename/delete',
  },
  'crm-ticket-details': {
    label: 'CRM Ticket Details', module: 'crm',
    desc: 'Side panel: assignee, status, tags, properties',
    position: 'CRM board - click ticket card - right panel slides in',
    flow: 'Click ticket - TicketDetailsPanel - edit fields - save',
  },
  'crm-property-settings': {
    label: 'CRM Property Settings', module: 'crm',
    desc: 'Show/hide and reorder CRM property columns',
    position: 'CRM board - top-right settings icon - ViewSettings drawer',
    flow: 'Settings icon - toggle visibility - drag to reorder',
  },
  'crm-custom-fields': {
    label: 'CRM Custom Fields', module: 'crm',
    desc: 'Create and manage custom fields for CRM tickets',
    position: 'CRM - Settings - Custom Fields tab',
    flow: 'CRM settings - Custom Fields - add/edit/delete field types',
  },
  'broadcasts-analytics': {
    label: 'Broadcasts Analytics', module: 'broadcasts',
    desc: 'Campaign analytics: delivery, open, click rates',
    position: 'Marketing - Broadcasts - campaign - Analytics tab',
    flow: 'Click campaign - Analytics tab - metrics + timeline chart',
  },
  'broadcasts-audience': {
    label: 'Broadcasts Audience', module: 'broadcasts',
    desc: 'Audience quality panel: contact health and opt-in rates',
    position: 'Marketing - Broadcasts - Audience tab',
    flow: 'New broadcast - Audience step - quality score + opt-in %',
  },
  'admin-team-analytics': {
    label: 'Admin Team Analytics', module: 'admin',
    desc: 'Team performance: response time, resolution rate, workload',
    position: 'Admin - Analytics - Team tab',
    flow: 'Admin - Analytics - Team - date picker - per-agent metrics',
  },
  'ai-chat-testing': {
    label: 'AI Chat Testing', module: 'ai',
    desc: 'Test AI chatbot responses in simulated chat window',
    position: 'AI Chatbot - select bot - Test tab (right panel)',
    flow: 'Open bot - Test tab - type message - see response + confidence',
  },
  'module-team': {
    label: 'Team Management', module: 'settings',
    desc: 'Invite members, assign roles, manage seats',
    position: 'Settings - Team - Members list',
    flow: 'Team settings - invite by email - assign role - remove',
  },
};

function toast(msg, type) {
  type = type || 'info';
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(function() { el.remove(); }, 5000);
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.textContent.toLowerCase().includes(name)); });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
}

function ciLabel(ci) {
  if (ci === 'pass')    return ['pass',    'CI Pass'];
  if (ci === 'fail')    return ['fail',    'CI Fail'];
  if (ci === 'running') return ['running', 'CI Running'];
  return ['pending', 'CI Pending'];
}

function discoverMissing() {
  var missing = Object.entries(GAP).filter(function(e) { return !e[1]; }).map(function(e) { return e[0]; });
  if (missing.length === 0) {
    toast('All features are implemented!', 'success');
  } else {
    toast('Missing features (' + missing.length + '): ' + missing.join(', '), 'info');
    showTab('gap');
  }
}

function triggerFixPrs() {
  toast('Claude Code agent is fixing lint + TS errors on all failing PRs. Open your local dashboard (localhost:4455) to track progress.', 'info');
  setTimeout(function() {
    toast('Tip: click "Fix Lint & Errors" on the local dashboard at localhost:4455 to run Claude Code automatically.', 'info');
  }, 2000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPrCard(pr) {
  var branchShort = pr.branch.replace(/^feat\/|^fix\//, '');
  var ci = ciLabel(pr.ci);
  return '<div class="kanban-card col-pr">' +
    '<div class="kc-number">PR #' + pr.number + '</div>' +
    '<div class="kc-title">' + escHtml(pr.title) + '</div>' +
    '<a class="kc-branch" href="' + pr.url + '" target="_blank">branch: ' + branchShort + '</a>' +
    '<div class="kc-footer">' +
    '<a class="kc-pr-btn" href="' + pr.url + '" target="_blank">View PR</a>' +
    '<span class="ci ' + ci[0] + '">' + ci[1] + '</span>' +
    '</div></div>';
}

function renderMissingCard(id) {
  var meta = FEATURE_META[id] || { label: id, module: '' };
  return '<div class="kanban-card col-missing">' +
    '<div class="kc-number">#' + id + '</div>' +
    '<div class="kc-title">' + escHtml(meta.label) + '</div>' +
    (meta.desc ? '<div class="kc-desc">' + escHtml(meta.desc) + '</div>' : '') +
    (meta.position ? '<div class="kc-position"><b>Where:</b> ' + escHtml(meta.position) + '<br><b>Flow:</b> ' + escHtml(meta.flow) + '</div>' : '') +
    '<div class="kc-footer"><span style="font-size:10px;color:#475569;padding:2px 8px;border:1px solid #1e2d40;border-radius:5px">' + escHtml(meta.module || 'inbox') + '</span></div>' +
    '</div>';
}

function renderDoneCard(id) {
  var meta = FEATURE_META[id] || { label: id, module: '' };
  return '<div class="kanban-card col-done">' +
    '<div class="kc-number">#' + id + '</div>' +
    '<div class="kc-title">' + escHtml(meta.label) + '</div>' +
    '<div class="kc-footer"><span class="ci pass">Implemented</span></div>' +
    '</div>';
}

function render(prs) {
  var passCount = prs.filter(function(p) { return p.ci === 'pass'; }).length;
  var failCount = prs.filter(function(p) { return p.ci === 'fail'; }).length;
  var missingFeatures = Object.entries(GAP).filter(function(e) { return !e[1]; });
  var doneFeatureIds  = Object.entries(GAP).filter(function(e) { return e[1]; }).map(function(e) { return e[0]; });
  var totalFeatures = Object.keys(GAP).length;

  document.getElementById('stats-bar').innerHTML =
    '<div class="stat blue"><div class="stat-num">' + totalFeatures + '</div><div class="stat-label">Features</div></div>' +
    '<div class="stat green"><div class="stat-num">' + doneFeatureIds.length + '</div><div class="stat-label">Done</div></div>' +
    '<div class="stat yellow"><div class="stat-num">' + missingFeatures.length + '</div><div class="stat-label">Missing</div></div>' +
    '<div class="stat purple"><div class="stat-num">' + prs.length + '</div><div class="stat-label">PRs Open</div></div>' +
    '<div class="stat green"><div class="stat-num">' + passCount + '</div><div class="stat-label">CI Pass</div></div>' +
    '<div class="stat red"><div class="stat-num">' + failCount + '</div><div class="stat-label">CI Fail</div></div>';

  var missingHtml = missingFeatures.length
    ? missingFeatures.map(function(e) { return renderMissingCard(e[0]); }).join('')
    : '<div class="kc-empty">All features implemented!</div>';

  var prHtml = prs.length
    ? prs.map(renderPrCard).join('')
    : '<div class="kc-empty">No open PRs</div>';

  var doneHtml = doneFeatureIds.length
    ? doneFeatureIds.map(renderDoneCard).join('')
    : '<div class="kc-empty">Nothing done yet</div>';

  document.getElementById('kanban-board').innerHTML =
    '<div class="kanban-col col-missing">' +
      '<div class="kanban-col-header">' +
        '<div class="kanban-col-header-top"><span class="kanban-col-title">Missing</span><span class="kanban-col-count">' + missingFeatures.length + '</span></div>' +
        '<button class="col-action-btn discover" onclick="discoverMissing()">Discover Missing Features</button>' +
      '</div>' +
      '<div class="kanban-cards">' + missingHtml + '</div>' +
    '</div>' +
    '<div class="kanban-col col-pr" style="min-width:270px;flex:0 0 270px">' +
      '<div class="kanban-col-header">' +
        '<div class="kanban-col-header-top"><span class="kanban-col-title">PR Open</span><span class="kanban-col-count">' + prs.length + '</span></div>' +
        '<button class="col-action-btn fix" onclick="triggerFixPrs()">&#129302; Fix with Claude Code</button>' +
      '</div>' +
      '<div class="kanban-cards">' + prHtml + '</div>' +
    '</div>' +
    '<div class="kanban-col col-done">' +
      '<div class="kanban-col-header">' +
        '<div class="kanban-col-header-top"><span class="kanban-col-title">Done</span><span class="kanban-col-count">' + doneFeatureIds.length + '</span></div>' +
      '</div>' +
      '<div class="kanban-cards">' + doneHtml + '</div>' +
    '</div>';

  document.getElementById('prs-list').innerHTML = prs.map(function(pr) {
    var ci = ciLabel(pr.ci);
    var branchShort = pr.branch.replace(/^feat\/|^fix\//, '');
    return '<div style="background:#0d1424;border:1px solid #1e2d40;border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">' +
      '<span style="font-size:11px;color:#475569;font-family:monospace;flex-shrink:0">#' + pr.number + '</span>' +
      '<span style="font-size:13px;font-weight:600;flex:1;min-width:200px">' + escHtml(pr.title) + '</span>' +
      '<a class="kc-branch" href="' + pr.url + '" target="_blank" style="flex-shrink:0">branch: ' + branchShort + '</a>' +
      '<span class="ci ' + ci[0] + '" style="flex-shrink:0">' + ci[1] + '</span>' +
      '<a class="kc-pr-btn" href="' + pr.url + '" target="_blank" style="flex-shrink:0">View PR</a>' +
      '</div>';
  }).join('');

  document.getElementById('gap-grid').innerHTML = Object.entries(GAP).map(function(entry) {
    var id = entry[0]; var ok = entry[1];
    var meta = FEATURE_META[id] || { label: id, module: '' };
    return '<div class="gap-item ' + (ok ? 'ok' : 'missing') + '">' +
      '<div class="gap-icon">' + (ok ? 'OK' : 'X') + '</div>' +
      '<div><div class="gap-label">' + escHtml(meta.label) + '</div>' +
      '<div class="gap-sub">' + (ok ? 'Implemented' : 'Missing') + '</div>' +
      (meta.position && !ok ? '<div class="gap-pos">Where: ' + escHtml(meta.position) + '</div>' : '') +
      '</div></div>';
  }).join('');
}

async function load() {
  document.getElementById('last-updated').textContent = 'Loading...';
  try {
    var r = await fetch('pipeline-data.json?t=' + Date.now());
    if (!r.ok) throw new Error('pipeline-data.json not found (build may be in progress)');
    var data = await r.json();
    render(data.prs || []);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date(data.updatedAt).toLocaleString();
  } catch (e) {
    document.getElementById('kanban-board').innerHTML =
      '<div class="error-msg">Could not load data: ' + escHtml(e.message) + '<br><small>Data is generated during GitHub Actions build. Check back shortly.</small></div>';
    document.getElementById('stats-bar').innerHTML = '';
    document.getElementById('last-updated').textContent = 'Error loading data';
  }
}

load();
</script>
</body>
</html>

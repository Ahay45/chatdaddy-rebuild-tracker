name: Fix Failing PRs

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Clone frontend-dashboard-v2
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/chatdaddy/frontend-dashboard-v2.git /tmp/v2
          cd /tmp/v2
          git config user.email "aiteam310@gmail.com"
          git config user.name "Claude Code Agent"

      - name: Run fix-prs agent
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_BIN: claude
        run: node scripts/fix-prs-ci.mjs
